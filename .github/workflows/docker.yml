name: Docker Build And Push

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: j4587698/jx.cms
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump against latest tag
        id: version_check
        shell: bash
        run: |
          set -euo pipefail

          VERSION_RAW=$(grep -oPm1 '(?<=<Version>)[^<]+' src/core/Jx.Cms.Web/Jx.Cms.Web.csproj || true)
          if [ -z "${VERSION_RAW}" ]; then
            echo "Version field not found in Jx.Cms.Web.csproj" >&2
            exit 1
          fi

          VERSION=${VERSION_RAW#v}
          NEW_TAG="v${VERSION}"

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${NEW_TAG}" >/dev/null; then
            echo "latest_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
            echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)

          if [ -z "${LATEST_TAG}" ]; then
            echo "latest_tag=" >> "$GITHUB_OUTPUT"
            echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_VERSION=${LATEST_TAG#v}
          HIGHEST=$(printf '%s\n%s\n' "${LATEST_VERSION}" "${VERSION}" | sort -V | tail -n 1)

          if [ "${VERSION}" = "${LATEST_VERSION}" ]; then
            echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
            echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${HIGHEST}" = "${VERSION}" ]; then
            echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
            echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
            echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push git tag
        if: steps.version_check.outputs.should_publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.version_check.outputs.new_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Set up Docker Buildx
        if: steps.version_check.outputs.should_publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.version_check.outputs.should_publish == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: steps.version_check.outputs.should_publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version_check.outputs.new_tag }}

      - name: Skip publish notice
        if: steps.version_check.outputs.should_publish != 'true'
        run: |
          echo "Version not increased. Skip git tag and Docker push."
          echo "csproj version tag: ${{ steps.version_check.outputs.new_tag }}"
          echo "latest git tag: ${{ steps.version_check.outputs.latest_tag }}"
